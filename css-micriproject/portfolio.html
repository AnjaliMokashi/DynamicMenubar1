<!DOCTYPE html>
<html>
<head>
<title>Portfolio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
animation:fadePage 1s;
}

@keyframes fadePage{
from{opacity:0;}
to{opacity:1;}
}

/* Navbar */

.navbar{
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00f2fe;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #00f2fe; }
to{ text-shadow:0 0 20px #00f2fe; }
}

/* Menu */

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-size:18px;
position:relative;
}

/* underline animation */

.menu a::after{
content:'';
position:absolute;
width:0%;
height:2px;
background:#00f2fe;
left:0;
bottom:-5px;
transition:0.3s;
}

.menu a:hover{
color:#00f2fe;
}

.menu a:hover::after{
width:100%;
}

/* Menu Icon */

.menu-icon{
font-size:26px;
cursor:pointer;
display:none;
}

/* Heading */

h1{
text-align:center;
margin-top:40px;
font-size:42px;
animation:slideUp 1s;
}

@keyframes slideUp{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

/* Gallery */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

/* Gallery Item */

.gallery-item{
position:relative;
overflow:hidden;
border-radius:12px;
}

/* Image */

.gallery img{
width:100%;
height:250px;
object-fit:cover;
transition:0.5s;
cursor:pointer;
}

/* hover animation */

.gallery-item:hover img{
transform:scale(1.15) rotate(2deg);
}

/* Overlay */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:0.4s;
}

.gallery-item:hover .overlay{
opacity:1;
}

.overlay i{
font-size:30px;
color:#00f2fe;
}

/* hover glow */

.gallery-item:hover{
box-shadow:0 0 20px #00f2fe;
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
animation:fadePage 0.4s;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
animation:zoomImg 0.4s;
}

@keyframes zoomImg{
from{transform:scale(0.7);}
to{transform:scale(1);}
}

.lightbox span{
position:absolute;
top:30px;
right:40px;
font-size:40px;
cursor:pointer;
}

/* Tablet */

@media(max-width:992px){

.gallery{
grid-template-columns:repeat(2,1fr);
}

}

/* Mobile */

@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
left:0;
width:100%;
background:#000;
text-align:center;
padding:20px 0;
z-index:1000;
}

.menu a{
display:block;
padding:12px;
border-bottom:1px solid #333;
}

.menu.active{
display:flex;
}

.menu-icon{
display:block;
}

.gallery{
grid-template-columns:1fr;
padding:20px;
}

}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

<div class="logo">My Website</div>

<div class="menu" id="menu">
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="portfolio.html">Portfolio</a>
<a href="contact.html">Contact</a>
</div>

<div class="menu-icon" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

</div>

<h1>My Portfolio</h1>

<!-- Gallery -->

<div class="gallery">

<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" onclick="openLightbox(this.src)">
<div class="overlay"><i class="fas fa-search"></i></div>
</div>

<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" onclick="openLightbox(this.src)">
<div class="overlay"><i class="fas fa-search"></i></div>
</div>

<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3" onclick="openLightbox(this.src)">
<div class="overlay"><i class="fas fa-search"></i></div>
</div>

<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" onclick="openLightbox(this.src)">
<div class="overlay"><i class="fas fa-search"></i></div>
</div>

<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308" onclick="openLightbox(this.src)">
<div class="overlay"><i class="fas fa-search"></i></div>
</div>

<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="openLightbox(this.src)">
<div class="overlay"><i class="fas fa-search"></i></div>
</div>

</div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">
<span onclick="closeLightbox()">&times;</span>
<img id="lightbox-img">
</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function openLightbox(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
