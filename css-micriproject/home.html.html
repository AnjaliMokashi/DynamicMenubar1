<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Home</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
color:white;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
position:sticky;
top:0;

background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);

z-index:1000;
}

/* Logo */

.logo{
font-size:25px;
font-weight:bold;
color:#00f2fe;

animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #00f2fe; }
to{ text-shadow:0 0 20px #00f2fe; }
}

/* Menu */

.menu{
list-style:none;
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-size:18px;
position:relative;
transition:0.3s;
}

/* Hover animation */

.menu a::after{
content:'';
position:absolute;
width:0%;
height:2px;
background:#00f2fe;
left:0;
bottom:-6px;
transition:0.3s;
}

.menu a:hover{
color:#00f2fe;
}

.menu a:hover::after{
width:100%;
}

/* Hamburger */

.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.hamburger div{
width:25px;
height:3px;
background:white;
transition:0.4s;
}

/* Slider */

.slider{
width:100%;
height:80vh;
overflow:hidden;
position:relative;
}

/* Slides */

.slides{
display:flex;
width:300%;
height:100%;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:100%;
object-fit:cover;

animation:zoom 12s infinite;
}

/* zoom animation */

@keyframes zoom{

0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}

}

/* Slider animation */

@keyframes slide{

0%{transform:translateX(0);}
30%{transform:translateX(0);}

35%{transform:translateX(-100%);}
65%{transform:translateX(-100%);}

70%{transform:translateX(-200%);}
100%{transform:translateX(-200%);}

}

/* Center text */

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:rgba(0,0,0,0.4);
padding:30px 50px;
border-radius:12px;

animation:fadeUp 2s;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translate(-50%,-30%);
}
to{
opacity:1;
transform:translate(-50%,-50%);
}
}

.text h1{
font-size:42px;
margin-bottom:10px;
}

.text p{
font-size:18px;
margin-bottom:20px;
}

/* Button */

.btn{
padding:10px 25px;
border:none;
border-radius:25px;

background:linear-gradient(45deg,#00f2fe,#4facfe);
color:white;

font-size:16px;
cursor:pointer;

transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 15px #00f2fe;
}

/* Mobile */

@media(max-width:768px){

.menu{
position:absolute;
top:60px;
left:0;
width:100%;
background:#000;
flex-direction:column;
align-items:center;

display:none;

transform:translateY(-20px);
opacity:0;
transition:0.3s;
}

.menu.active{
display:flex;
transform:translateY(0);
opacity:1;
}

.menu li{
padding:15px;
border-bottom:1px solid #333;
width:100%;
text-align:center;
}

.hamburger{
display:flex;
}

.text h1{
font-size:30px;
}

.slider{
height:60vh;
}

}

@media(max-width:480px){

.slider{
height:50vh;
}

.text h1{
font-size:24px;
}

.text p{
font-size:14px;
}

}

</style>
</head>

<body>

<nav class="navbar">

<div class="logo">MyWebsite</div>

<ul class="menu">

<li><a href="home.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="portfolio.html">Portfolio</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

<div class="hamburger" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>

</nav>

<div class="slider">

<div class="slides">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">

</div>

<div class="text">

<h1>Welcome To My Website</h1>

<p>Responsive Image Slider Example</p>

<button class="btn">Explore</button>

</div>

</div>

<script>

function toggleMenu(){
document.querySelector(".menu").classList.toggle("active");
}

document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click",()=>{
document.querySelector(".menu").classList.remove("active");
});
});

</script>

</body>
</html>
