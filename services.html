<!DOCTYPE html>
<html>
<head>
<title>Services</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
animation:fadePage 1s;
}

@keyframes fadePage{
from{opacity:0;}
to{opacity:1;}
}

/* Navbar */

.navbar{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
position:sticky;
top:0;
z-index:1000;
}

/* Logo */

.logo{
font-size:22px;
font-weight:bold;
color:#00f2fe;

animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #00f2fe; }
to{ text-shadow:0 0 20px #00f2fe; }
}

/* Menu */

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-size:18px;
position:relative;
}

/* underline animation */

.menu a::after{
content:'';
position:absolute;
width:0%;
height:2px;
background:#00f2fe;
left:0;
bottom:-5px;
transition:0.3s;
}

.menu a:hover{
color:#00f2fe;
}

.menu a:hover::after{
width:100%;
}

/* Menu Icon */

.menu-icon{
font-size:25px;
cursor:pointer;
display:none;
}

/* Container */

.container{
text-align:center;
padding:70px 20px;
}

h1{
font-size:42px;
margin-bottom:20px;
animation:slideUp 1s;
}

@keyframes slideUp{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

/* Services */

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
max-width:1100px;
margin:auto;
margin-top:40px;
}

/* Service Box */

.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(5px);
padding:35px;
border-radius:15px;
transition:0.4s;
position:relative;
overflow:hidden;
}

/* icon */

.box i{
font-size:40px;
margin-bottom:15px;
color:#00f2fe;
transition:0.4s;
}

/* hover effects */

.box:hover{
transform:translateY(-12px) scale(1.05);
box-shadow:0 0 20px #00f2fe;
}

.box:hover i{
transform:rotate(10deg) scale(1.2);
}

.box h3{
margin-bottom:10px;
}

.box p{
font-size:15px;
line-height:1.5;
}

/* Tablet */

@media(max-width:992px){

.services{
grid-template-columns:repeat(2,1fr);
}

}

/* Mobile */

@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
left:0;
width:100%;
background:#000;
text-align:center;
padding:20px 0;
}

.menu a{
display:block;
padding:12px;
border-top:1px solid #333;
}

.menu.active{
display:flex;
}

.menu-icon{
display:block;
}

.services{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">MyWebsite</div>

<div class="menu" id="menu">
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="portfolio.html">Portfolio</a>
<a href="contact.html">Contact</a>
</div>

<div class="menu-icon" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

</div>

<div class="container">

<h1>Our Services</h1>

<div class="services">

<div class="box">
<i class="fas fa-laptop-code"></i>
<h3>Web Design</h3>
<p>Modern and responsive website design.</p>
</div>

<div class="box">
<i class="fas fa-code"></i>
<h3>Development</h3>
<p>Fast and secure website development.</p>
</div>

<div class="box">
<i class="fas fa-headset"></i>
<h3>Support</h3>
<p>24/7 support for your website.</p>
</div>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

</script>

</body>
</html>
